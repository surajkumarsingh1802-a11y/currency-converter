<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="converter-card">
    <h1>Currency Converter</h1>
    <p class="subtitle">Live exchange rates, updated in real time</p>

    <form id="converter-form">
      <div class="input-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" value="1" min="0" step="any" required />
      </div>

      <div class="currency-row">
        <div class="select-group">
          <label for="from-currency">From</label>
          <select id="from-currency"></select>
        </div>

        <button type="button" id="swap-btn" title="Swap currencies" aria-label="Swap currencies">
          ⇄
        </button>

        <div class="select-group">
          <label for="to-currency">To</label>
          <select id="to-currency"></select>
        </div>
      </div>

      <button type="submit" id="convert-btn">Convert</button>
    </form>

    <div id="result-box" class="result-box hidden">
      <p id="result-text"></p>
      <p id="rate-text" class="rate-text"></p>
    </div>

    <p id="status-text" class="status-text"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
